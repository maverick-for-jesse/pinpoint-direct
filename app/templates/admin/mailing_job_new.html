{% extends 'admin/base.html' %}

{% block title %}New Mailing Job{% endblock %}

{% block content %}
<div class="topbar">
  <h1 class="page-title">New Mailing Job</h1>
  <div class="topbar-actions">
    <a href="{{ url_for('admin.mailing_jobs') }}" class="btn btn-secondary">← Back</a>
  </div>
</div>

<div class="card" style="max-width: 640px;">
  <form method="POST">
    <div class="form-group">
      <label class="form-label">Job Name <span style="color:#e63946">*</span></label>
      <input type="text" name="job_name" class="form-control" required placeholder="e.g. May 2026 New Movers Drop">
    </div>

    <div class="form-group">
      <label class="form-label">Client</label>
      <select name="client_id" class="form-control">
        <option value="">— Select Client —</option>
        {% for client in clients %}
        <option value="{{ client.id }}">{{ client.fields['Company Name'] }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Campaign</label>
      <select name="campaign_id" class="form-control">
        <option value="">— Select Campaign —</option>
        {% for campaign in campaigns %}
        <option value="{{ campaign.id }}">{{ campaign.fields['Campaign Name'] }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Mail Class</label>
      <select name="mail_class" class="form-control">
        <option value="USPS Marketing Mail">USPS Marketing Mail</option>
        <option value="First-Class Mail">First-Class Mail</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Piece Count</label>
      <input type="number" name="piece_count" class="form-control" min="0" placeholder="0">
    </div>

    <div class="form-group">
      <label class="form-label">Notes</label>
      <textarea name="notes" class="form-control" rows="3" placeholder="Any additional notes..."></textarea>
    </div>

    <div style="margin-top: 24px;">
      <button type="submit" class="btn btn-primary">Create Mailing Job</button>
      <a href="{{ url_for('admin.mailing_jobs') }}" class="btn btn-secondary" style="margin-left: 8px;">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
